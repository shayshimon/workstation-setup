# Tmux Configuration
# ~/.tmux.conf

# ──────────────────────────────────────────────────────────────────
# PREFIX
# ──────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ──────────────────────────────────────────────────────────────────
# GENERAL
# ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
# Advertise truecolor for the actual outer terminals (terminal-features is the
# modern replacement for the RGB terminal-overrides hack; tmux 3.2+).
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-256color:RGB"
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on
set -g mouse on

# Double-click to zoom/unzoom a pane
bind -n DoubleClick1Pane resize-pane -Z

# ──────────────────────────────────────────────────────────────────
# KEYBINDINGS
# ──────────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Splits (intuitive keys)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (hold prefix + arrow)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching
bind -r n next-window
bind -r p previous-window

# ──────────────────────────────────────────────────────────────────
# COPY MODE (vim keys)
# ──────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ──────────────────────────────────────────────────────────────────
# STATUS BAR
# ──────────────────────────────────────────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 30
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#6c7086]│ "

set -g status-right-length 60
set -g status-right "#[fg=#6c7086]│ #[fg=#a6e3a1]%H:%M #[fg=#6c7086]│ #[fg=#f9e2af]%b %d"

# Window tabs
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ──────────────────────────────────────────────────────────────────
# PLUGINS (via TPM)
# ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'    # auto-save sessions
set -g @plugin 'tmux-plugins/tmux-yank'         # better copy

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
