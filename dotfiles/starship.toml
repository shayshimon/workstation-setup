# Starship Prompt Configuration
# ~/.config/starship.toml

# Minimal, informative prompt — single line: status then prompt
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$aws\
$cmd_duration\
$character"""

# Don't add blank line between prompts
add_newline = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "\\$"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

[python]
symbol = " "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "yellow"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "green"

[aws]
symbol = "☁️ "
format = '[$symbol($profile )(\[$region\] )]($style)'
style = "bold orange"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold yellow"

[package]
disabled = true

[docker_context]
disabled = true
